<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BanqOk | نظام إدارة القروض المتقدم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="loan-data.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #d1fae5;
      --secondary: #ffffff;
      --secondary-light: #006dfc;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --warning-dark: #f97316;
      --text-dark: #1f2937;
      --text-light: #6b7280;
      --bg-light: #f9fafb;
      --border: #e5e7eb;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 40px -12px rgba(0,0,0,0.2);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: var(--text-dark);
      background: #f0f2f5;
    }

    .dashboard-container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .stats-header {
      background: white;
      border-radius: var(--radius-lg);
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: var(--shadow-md);
    }

    .header-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-title h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      background: var(--bg-light);
      padding: 12px 25px;
      border-radius: 40px;
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      border: 1px solid var(--border);
    }

    .back-link:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #fff, #f8fafc);
      padding: 20px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid var(--border);
      transition: transform 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .stat-icon.banks { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .stat-icon.loans { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .stat-icon.personal { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .stat-icon.mortgage { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
    .stat-icon.car { background: linear-gradient(135deg, #ec4899, #db2777); color: white; }
    .stat-icon.corporate { background: linear-gradient(135deg, #14b8a6, #0d9488); color: white; }

    .stat-details h3 {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .stat-details p {
      color: var(--text-light);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .action-bar {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 8px 18px rgba(16,185,129,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(16,185,129,0.4);
    }

    .btn-secondary {
      background: white;
      color: var(--text-dark);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-light);
      border-color: var(--primary);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      box-shadow: 0 8px 18px rgba(249,115,22,0.3);
    }

    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(249,115,22,0.4);
    }

    .btn-filter {
      background: var(--secondary-light);
      color: var(--secondary);
    }

    .banks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 25px;
      margin-top: 25px;
    }

    .bank-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .bank-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary-light), transparent);
      border-radius: 0 0 0 100px;
      opacity: 0.5;
    }

    .bank-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }

    .bank-type-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
      z-index: 1;
    }

    .bank-type-badge.government { background: var(--primary-light); color: var(--primary-dark); }
    .bank-type-badge.private { background: var(--secondary-light); color: var(--secondary); }
    .bank-type-badge.islamic { background: #fef3c7; color: #92400e; }

    .bank-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .bank-logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
      padding: 8px;
      border: 2px solid var(--border);
    }

    .bank-title h3 {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0;
    }

    .bank-title p {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .bank-stats-mini {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background: var(--bg-light);
      border-radius: var(--radius-md);
    }

    .mini-stat {
      text-align: center;
      flex: 1;
    }

    .mini-stat .value {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .mini-stat .label {
      font-size: 0.7rem;
      color: var(--text-light);
    }

    .loan-categories {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .category-tag {
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      background: #f1f5f9;
      color: var(--text-dark);
    }

    .category-tag.personal { background: var(--warning-light); color: #92400e; }
    .category-tag.mortgage { background: #e0f2fe; color: #0369a1; }
    .category-tag.car { background: #fae8ff; color: #a21caf; }
    .category-tag.corporate { background: #d1fae5; color: #065f46; }

    .card-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .card-btn {
      padding: 10px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .card-btn.view { background: var(--secondary-light); color: var(--secondary); }
    .card-btn.edit { background: var(--primary-light); color: var(--primary-dark); }
    .card-btn.loans { background: #f3e8ff; color: #7e22ce; }
    .card-btn:hover {
      transform: scale(0.95);
      filter: brightness(0.95);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active { display: flex; }

    .modal-container {
      background: white;
      border-radius: var(--radius-lg);
      width: 95%;
      max-width: 1300px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
      position: relative;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--bg-light);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }

    .modal-close:hover {
      background: var(--danger-light);
      color: var(--danger);
      transform: rotate(90deg);
    }

    .modal-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 25px;
      padding-left: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loan-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 15px;
    }

    .loan-tab {
      padding: 10px 25px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      list-style: none;
    }

    .loan-tab:hover {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .loan-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: var(--primary);
    }

    button::marker,
    .btn::marker,
    .card-btn::marker,
    .loan-tab::marker,
    .edit-loan-btn::marker,
    .modal-close::marker {
      display: none !important;
      content: "" !important;
    }

    .loans-table-container {
      overflow-x: auto;
      margin-bottom: 25px;
    }

    .loans-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 1000px;
    }

    .loans-table th {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      padding: 15px;
      font-weight: 700;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }

    .loans-table td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .loans-table tr:hover td {
      background: var(--bg-light);
    }

    .interest-badge {
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .interest-badge.decreasing { background: var(--primary-light); color: var(--primary-dark); }
    .interest-badge.fixed { background: var(--secondary-light); color: var(--secondary); }

    .edit-loan-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background: var(--warning-light);
      color: #92400e;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .edit-loan-btn:hover {
      background: var(--warning);
      color: white;
    }

    .edit-loan-form {
      background: var(--bg-light);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-top: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text-dark);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
    }

    .interest-type-group {
      display: flex;
      gap: 15px;
      padding: 10px;
      background: white;
      border-radius: var(--radius-sm);
    }

    .interest-type-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: normal;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary-light));
      width: 0%;
      transition: width 0.3s;
      z-index: 2000;
    }

    .direction-note {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--primary-dark);
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      animation: slideInRight 0.3s;
      z-index: 100;
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    
    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .modal-container { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  
  <div class="dashboard-container">
    <div class="stats-header">
      <div class="header-title">
        <h1>
          <i class="bi bi-graph-up-arrow"></i>
          نظام إدارة القروض المتقدم
        </h1>
        <a href="admin-dashboard.html" class="back-link">
          <i class="bi bi-arrow-right"></i>
          العودة للوحة التحكم
        </a>
      </div>

      <div class="stats-grid" id="statsContainer"></div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="exportDataBtn">
        <i class="bi bi-download"></i>
        تصدير البيانات
      </button>
      <button class="btn btn-secondary" id="importDataBtn">
        <i class="bi bi-upload"></i>
        استيراد بيانات
      </button>
      <button class="btn btn-secondary" id="refreshStatsBtn">
        <i class="bi bi-arrow-repeat"></i>
        تحديث الإحصائيات
      </button>
      <button class="btn btn-warning" id="resetDatabaseBtn">
        <i class="bi bi-database-up"></i>
        تحديث قاعدة البيانات من الملف
      </button>
    </div>

    <div id="banksGrid" class="banks-grid"></div>
  </div>

  <div class="modal-overlay" id="mainModal">
    <div class="modal-container">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    (function() {
      // ==================== متغيرات IndexedDB ====================
      const DB_NAME = 'BanksDatabase';
      const DB_VERSION = 1;
      const STORE_NAME = 'banks';

      let banksData = [];
      let currentBankId = null;
      let currentCategory = 'all';
      let currentEditingLoan = null;

      // عناصر DOM
      const banksGrid = document.getElementById('banksGrid');
      const modalOverlay = document.getElementById('mainModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalContent = document.getElementById('modalContent');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const statsContainer = document.getElementById('statsContainer');
      const exportBtn = document.getElementById('exportDataBtn');
      const importBtn = document.getElementById('importDataBtn');
      const refreshStatsBtn = document.getElementById('refreshStatsBtn');
      const resetDatabaseBtn = document.getElementById('resetDatabaseBtn');
      const progressBar = document.getElementById('progressBar');

      // ==================== دوال IndexedDB ====================
      async function loadBanksFromDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          
          request.onerror = () => {
            console.error('Error opening DB, using default data');
            resolve(JSON.parse(JSON.stringify(window.completeBanksData)));
          };
          
          request.onsuccess = () => {
            const db = request.result;
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const getRequest = store.getAll();
            
            getRequest.onsuccess = () => {
              const data = getRequest.result;
              if (data && data.length > 0) {
                resolve(data);
              } else {
                resolve(JSON.parse(JSON.stringify(window.completeBanksData)));
              }
            };
            
            getRequest.onerror = () => {
              resolve(JSON.parse(JSON.stringify(window.completeBanksData)));
            };
          };
          
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
        });
      }

      async function saveBanksToDB(data) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          
          request.onerror = () => reject(request.error);
          
          request.onsuccess = () => {
            const db = request.result;
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            
            store.clear();
            
            data.forEach(bank => {
              store.add(bank);
            });
            
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
          };
          
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
        });
      }

      // ==================== تحديث شريط التقدم ====================
      function updateProgress(percent) {
        progressBar.style.width = percent + '%';
        if (percent >= 100) {
          setTimeout(() => {
            progressBar.style.width = '0%';
          }, 500);
        }
      }

      // ==================== حساب الإحصائيات ====================
      function calculateStats() {
        let totalBanks = banksData.length;
        let governmentBanks = banksData.filter(b => b.type === 'government').length;
        let privateBanks = banksData.filter(b => b.type === 'private').length;
        let islamicBanks = banksData.filter(b => b.type === 'islamic').length;
        
        let totalLoans = 0;
        let personalLoans = 0;
        let mortgageLoans = 0;
        let carLoans = 0;
        let corporateLoans = 0;

        banksData.forEach(bank => {
          if (bank.loanCategories) {
            Object.entries(bank.loanCategories).forEach(([category, loans]) => {
              totalLoans += loans.length;
              switch(category) {
                case 'personal': personalLoans += loans.length; break;
                case 'mortgage': mortgageLoans += loans.length; break;
                case 'car': carLoans += loans.length; break;
                case 'corporate': corporateLoans += loans.length; break;
              }
            });
          }
        });

        return {
          totalBanks,
          governmentBanks,
          privateBanks,
          islamicBanks,
          totalLoans,
          personalLoans,
          mortgageLoans,
          carLoans,
          corporateLoans
        };
      }

      // ==================== عرض الإحصائيات ====================
      function renderStats() {
        const stats = calculateStats();
        
        statsContainer.innerHTML = `
          <div class="stat-card">
            <div class="stat-icon banks">
              <i class="bi bi-bank2"></i>
            </div>
            <div class="stat-details">
              <h3>${stats.totalBanks}</h3>
              <p>إجمالي البنوك</p>
              <small style="color: #3b82f6;">حكومي: ${stats.governmentBanks}</small><br>
              <small style="color: #10b981;">خاص: ${stats.privateBanks}</small><br>
              <small style="color: #f59e0b;">إسلامي: ${stats.islamicBanks}</small>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon loans">
              <i class="bi bi-calculator"></i>
            </div>
            <div class="stat-details">
              <h3>${stats.totalLoans}</h3>
              <p>إجمالي القروض</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon personal">

      window.switchLoanTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
        document.querySelectorAll('.loan-tab').forEach(tab => tab.classList.remove('active'));
        
        document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}Content`).style.display = 'block';
        document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
      };

      window.saveLoanChanges = async function() {
        if (!currentEditingLoan) return;
        const { bankId, category, loanId } = currentEditingLoan;
        const bank = banksData.find(b => b.id === bankId);
        if (!bank) return;

        const loan = bank.loanCategories[category]?.find(l => l.id === loanId);
        if (!loan) return;

        loan.name = document.getElementById('editLoanName').value;
        loan.minAmount = parseFloat(document.getElementById('editMinAmount').value) || 0;
        loan.maxAmount = parseFloat(document.getElementById('editMaxAmount').value) || 0;
        loan.minTerm = parseInt(document.getElementById('editMinTerm').value) || 12;
        loan.maxTerm = parseInt(document.getElementById('editMaxTerm').value) || 12;
        loan.interestRate = parseFloat(document.getElementById('editInterestRate').value) || 0;
        loan.interestType = document.querySelector('input[name="editInterestType"]:checked')?.value || 'decreasing';
        loan.description = document.getElementById('editDescription')?.value || loan.description;
        loan.conditions = document.getElementById('editConditions')?.value || loan.conditions;
        loan.target = document.getElementById('editTarget')?.value || loan.target;
        loan.documents = document.getElementById('editDocuments')?.value || loan.documents;

        updateProgress(70);
        renderBanksGrid();
        renderStats();
        updateProgress(100);
        
        await saveBanksToDB(banksData);
        
        showNotification('تم تحديث القرض بنجاح', 'success');
        closeModal();
      };

              <div class="form-group">
                <label>تصنيف القرض</label>
                <select id="newLoanCategory">
                  <option value="personal">شخصي</option>
                  <option value="mortgage">عقاري</option>
                  <option value="car">سيارات</option>
                  <option value="corporate">شركات</option>
                </select>
              </div>

                <label>اسم القرض</label>

                <input type="number" step="0.01" id="newInterestRate" value="18">

              <div class="form-group">
                <label>نوع الفائدة</label>
                <div class="interest-type-group">
                  <label><input type="radio" name="newInterestType" value="decreasing" checked> متناقصة</label>
                  <label><input type="radio" name="newInterestType" value="fixed"> ثابتة</label>
                </div>
              </div>
              <div class="form-group">
                <label>الوصف</label>
                <textarea id="newDescription" rows="3" placeholder="وصف القرض..."></textarea>

              <div class="form-group">
                <label>الشروط</label>
                <textarea id="newConditions" rows="3" placeholder="شروط القرض..."></textarea>
              </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
              <button class="btn btn-primary" onclick="saveNewLoan(${bankId}, '${newLoanId}')">
                <i class="bi bi-check-lg"></i> حفظ القرض
              </button>
              <button class="btn btn-secondary" onclick="cancelAddForm()">
                <i class="bi bi-x-lg"></i> إلغاء
              </button>
            </div>
          </div>
        `;

        document.getElementById('editFormContainer').innerHTML = addForm;
      };

      window.saveNewLoan = async function(bankId, loanId) {
        const bank = banksData.find(b => b.id === bankId);
        if (!bank) return;

        const category = document.getElementById('newLoanCategory').value;
        
        if (!bank.loanCategories[category]) {
          bank.loanCategories[category] = [];
        }

        const newLoan = {
          id: loanId,
          name: document.getElementById('newLoanName').value || 'قرض جديد',
          minAmount: parseFloat(document.getElementById('newMinAmount').value) || 10000,
          maxAmount: parseFloat(document.getElementById('newMaxAmount').value) || 1000000,
          minTerm: parseInt(document.getElementById('newMinTerm').value) || 12,
          maxTerm: parseInt(document.getElementById('newMaxTerm').value) || 60,
          interestRate: parseFloat(document.getElementById('newInterestRate').value) || 18,
          interestType: document.querySelector('input[name="newInterestType"]:checked')?.value || 'decreasing',
          description: document.getElementById('newDescription').value || '',
          conditions: document.getElementById('newConditions').value || ''
        };

        bank.loanCategories[category].push(newLoan);
        
        updateProgress(70);
        
        await saveBanksToDB(banksData);
        
        manageBankLoans(bankId);
        renderBanksGrid();
        renderStats();
        updateProgress(100);
        
        showNotification('تم إضافة القرض بنجاح', 'success');
      };

      window.cancelAddForm = function() {
        document.getElementById('editFormContainer').innerHTML = '';
      };

      window.confirmDeleteLoan = async function(bankId, category, loanId) {
        if (confirm('هل أنت متأكد من حذف هذا القرض؟ لا يمكن التراجع عن هذا الإجراء.')) {
          const bank = banksData.find(b => b.id === parseInt(bankId));
          if (!bank) return;

          const index = bank.loanCategories[category]?.findIndex(l => l.id === loanId);
          if (index > -1) {
            bank.loanCategories[category].splice(index, 1);
            
            updateProgress(50);
            
            await saveBanksToDB(banksData);
            
            renderBanksGrid();
            renderStats();
            updateProgress(100);
            
            showNotification('تم حذف القرض بنجاح', 'success');
            closeModal();
          }
        }
      };

      window.filterLoans = function(category) {
        const bank = banksData.find(b => b.id === currentBankId);
        if (bank) {
          currentCategory = category;
        }
      };

      window.editBankDetails = function(bankId) {
        const bank = banksData.find(b => b.id === bankId);
        if (!bank) return;

        modalTitle.innerHTML = `<i class="bi bi-pencil-square"></i> تعديل بيانات البنك - ${bank.name}`;

        modalContent.innerHTML = `
          <div class="edit-loan-form">
            <div class="form-grid">
              <div class="form-group">
                <label>اسم البنك (عربي)</label>
                <input type="text" id="editBankName" value="${bank.name}">
              </div>
              <div class="form-group">
                <label>الاسم بالإنجليزية</label>
                <input type="text" id="editBankNameEn" value="${bank.nameEn || ''}">
              </div>
              <div class="form-group">
                <label>نوع البنك</label>
                <select id="editBankType">
                  <option value="government" ${bank.type === 'government' ? 'selected' : ''}>حكومي</option>
                  <option value="private" ${bank.type === 'private' ? 'selected' : ''}>خاص</option>
                  <option value="islamic" ${bank.type === 'islamic' ? 'selected' : ''}>إسلامي</option>
                </select>
              </div>
              <div class="form-group">
                <label>مسار الشعار</label>
                <input type="text" id="editBankLogo" value="${bank.logo}">
              </div>
              <div class="form-group">
                <label>عدد الفروع</label>
                <input type="text" id="editBranches" value="${bank.branches}">
              </div>
              <div class="form-group">
                <label>الحد الأدنى للمرتب</label>
                <input type="number" id="editMinSalary" value="${bank.minSalary}">
              </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
              <button class="btn btn-primary" onclick="saveBankEdit(${bankId})">
                <i class="bi bi-check-lg"></i> حفظ التعديلات
              </button>
              <button class="btn btn-secondary" onclick="closeModal()">
                <i class="bi bi-x-lg"></i> إلغاء
              </button>
            </div>
          </div>
        `;

        modalOverlay.classList.add('active');
      };

      window.saveBankEdit = async function(bankId) {
        const bank = banksData.find(b => b.id === bankId);
        if (!bank) return;

        bank.name = document.getElementById('editBankName').value;
        bank.nameEn = document.getElementById('editBankNameEn').value;
        bank.type = document.getElementById('editBankType').value;
        bank.logo = document.getElementById('editBankLogo').value;
        bank.branches = document.getElementById('editBranches').value;
        bank.minSalary = parseInt(document.getElementById('editMinSalary').value) || 1500;

        updateProgress(70);
        renderBanksGrid();
        renderStats();
        updateProgress(100);
        
        await saveBanksToDB(banksData);
        
        showNotification('تم تحديث بيانات البنك بنجاح', 'success');
        closeModal();
      };

      function showNotification(message, type = 'info') {
        alert(message);
      }

      function exportData() {
        const dataStr = JSON.stringify(banksData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `banqok_banks_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        
        showNotification('تم تصدير البيانات بنجاح', 'success');
      }

      function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        
        input.onchange = function(e) {
          const file = e.target.files[0];
          const reader = new FileReader();
          
          reader.onload = async function(ev) {
            try {
              const importedData = JSON.parse(ev.target.result);
              if (Array.isArray(importedData)) {
                banksData = importedData;
                updateProgress(50);
                
                await saveBanksToDB(banksData);
                
                renderBanksGrid();
                renderStats();
                updateProgress(100);
                showNotification('تم استيراد البيانات بنجاح', 'success');
              } else {
                showNotification('ملف غير صالح', 'error');
              }
            } catch (err) {
              showNotification('خطأ في قراءة الملف', 'error');
            }
          };
          
          reader.readAsText(file);
        };
        
        input.click();
      }

      async function resetDatabaseFromFile() {
        if (confirm('سيتم تحديث قاعدة البيانات بآخر البيانات من ملف banks-data.js. هل أنت متأكد؟')) {
          updateProgress(30);
          
          banksData = JSON.parse(JSON.stringify(window.completeBanksData));
          
          await saveBanksToDB(banksData);
          
          updateProgress(70);
          renderBanksGrid();
          renderStats();
          updateProgress(100);
          
          showNotification('تم تحديث قاعدة البيانات بالبيانات الجديدة بنجاح', 'success');
        }
      }

      window.closeModal = function() {
        modalOverlay.classList.remove('active');
        modalContent.innerHTML = '';
        document.getElementById('editFormContainer').innerHTML = '';
        currentEditingLoan = null;
      };

      async function init() {
        banksData = await loadBanksFromDB();
        
        console.log('✅ تم تحميل بيانات البنوك:', banksData.length);
        console.log('📊 البنوك المتاحة:', banksData.map(b => b.name));

        renderBanksGrid();
        renderStats();
        
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
          if (e.target === modalOverlay) closeModal();
        });
        
        exportBtn.addEventListener('click', exportData);
        importBtn.addEventListener('click', importData);
        refreshStatsBtn.addEventListener('click', () => {
          updateProgress(30);
          renderStats();
          updateProgress(100);
          showNotification('تم تحديث الإحصائيات', 'success');
        });
        
        resetDatabaseBtn.addEventListener('click', resetDatabaseFromFile);
      }

      init();
    })();
  </script>
</body>
</html>
