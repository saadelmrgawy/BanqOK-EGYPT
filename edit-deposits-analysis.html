<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BanqOk | نظام إدارة الودائع المتقدم - متوافق مع كافة بيانات البنوك</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #d1fae5;
      --secondary: #ffffff;
      --secondary-blue: #3b82f6;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --text-dark: #1f2937;
      --text-light: #6b7280;
      --bg-light: #f9fafb;
      --border: #e5e7eb;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 40px -12px rgba(0,0,0,0.2);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: var(--text-dark);
      background: #f0f2f5;
    }

    .dashboard-container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .stats-header {
      background: white;
      border-radius: var(--radius-lg);
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: var(--shadow-md);
    }

    .header-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-title h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      background: var(--bg-light);
      padding: 12px 25px;
      border-radius: 40px;
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      border: 1px solid var(--border);
    }

    .back-link:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #fff, #f8fafc);
      padding: 20px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid var(--border);
      transition: transform 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .stat-icon.banks { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .stat-icon.certificates { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .stat-icon.savings { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .stat-icon.fixed { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }

    .stat-details h3 {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .stat-details p {
      color: var(--text-light);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .action-bar {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 8px 18px rgba(16,185,129,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(16,185,129,0.4);
    }

    .btn-secondary {
      background: white;
      color: var(--text-dark);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-light);
      border-color: var(--primary);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      box-shadow: 0 8px 18px rgba(249,115,22,0.3);
    }

    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(249,115,22,0.4);
    }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    
    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    .btn-info {
      background: linear-gradient(135deg, var(--secondary-blue), #1d4ed8);
      color: white;
    }

    .banks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 25px;
      margin-top: 25px;
    }

    .bank-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .bank-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary-light), transparent);
      border-radius: 0 0 0 100px;
      opacity: 0.5;
    }

    .bank-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }

    .bank-type-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
      z-index: 1;
    }

    .bank-type-badge.government { background: var(--primary-light); color: var(--primary-dark); }
    .bank-type-badge.private { background: #dbeafe; color: #1e40af; }
    .bank-type-badge.islamic { background: #fef3c7; color: #92400e; }

    .bank-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .bank-logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
      padding: 8px;
      border: 2px solid var(--border);
    }

    .bank-title h3 {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0;
    }

    .bank-title p {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .bank-stats-mini {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background: var(--bg-light);
      border-radius: var(--radius-md);
    }

    .mini-stat {
      text-align: center;
      flex: 1;
    }

    .mini-stat .value {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .mini-stat .label {
      font-size: 0.7rem;
      color: var(--text-light);
    }

    .deposit-categories {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .category-tag {
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      background: #f1f5f9;
      color: var(--text-dark);
    }

    .category-tag.certificates { background: var(--primary-light); color: #065f46; }
    .category-tag.savings { background: var(--warning-light); color: #92400e; }
    .category-tag.fixed { background: #e0f2fe; color: #0369a1; }

    .card-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .card-btn {
      padding: 10px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .card-btn.view { background: var(--secondary-blue); color: white; }
    .card-btn.edit { background: var(--primary-light); color: var(--primary-dark); }
    .card-btn.deposits { background: #f3e8ff; color: #7e22ce; }
    .card-btn:hover {
      transform: scale(0.95);
      filter: brightness(0.95);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active { display: flex; }

    .modal-container {
      background: white;
      border-radius: var(--radius-lg);
      width: 95%;
      max-width: 1400px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
      position: relative;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--bg-light);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }

    .modal-close:hover {
      background: var(--danger-light);
      color: var(--danger);
      transform: rotate(90deg);
    }

    .modal-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 25px;
      padding-left: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .deposit-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 15px;
    }

    .deposit-tab {
      padding: 10px 25px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      list-style: none;
    }

    .deposit-tab:hover {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .deposit-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: var(--primary);
    }

    .deposits-table-container {
      overflow-x: auto;
      margin-bottom: 25px;
    }

    .deposits-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 1000px;
    }

    .deposits-table th {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      padding: 15px;
      font-weight: 700;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }

    .deposits-table td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .deposits-table tr:hover td {
      background: var(--bg-light);
    }

    .return-badge {
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .edit-deposit-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background: var(--warning-light);
      color: #92400e;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .edit-deposit-btn:hover {
      background: var(--warning);
      color: white;
    }

    .edit-deposit-form {
      background: var(--bg-light);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-top: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text-dark);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
    }

    .form-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .interest-rate-group {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 15px;
      margin-bottom: 15px;
    }

    .interest-rate-header {
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--primary-dark);
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary-blue));
      width: 0%;
      transition: width 0.3s;
      z-index: 2000;
    }

    .json-editor {
      font-family: monospace;
      font-size: 12px;
      direction: ltr;
      text-align: left;
    }

    hr {
      margin: 20px 0;
      border-color: var(--border);
    }

    .info-text {
      color: var(--text-light);
      font-size: 0.8rem;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  
  <div class="dashboard-container">
    <div class="stats-header">
      <div class="header-title">
        <h1>
          <i class="bi bi-piggy-bank"></i>
          نظام إدارة الودائع المتقدم - متوافق مع جميع بيانات البنوك
        </h1>
        <a href="./admin-dashboard.html" class="back-link" >
          <i class="bi bi-arrow-right"></i>
          العودة للوحة التحكم
        </a>
      </div>

      <div class="stats-grid" id="statsContainer"></div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="exportDataBtn">
        <i class="bi bi-download"></i>
        تصدير البيانات (JSON)
      </button>
      <button class="btn btn-secondary" id="importDataBtn">
        <i class="bi bi-upload"></i>
        استيراد بيانات
      </button>
      <button class="btn btn-secondary" id="refreshStatsBtn">
        <i class="bi bi-arrow-repeat"></i>
        تحديث الإحصائيات
      </button>
      <button class="btn btn-warning" id="resetDatabaseBtn">
        <i class="bi bi-database-up"></i>
        إعادة تعيين البيانات من الملف الخارجي
      </button>
    </div>

    <div id="banksGrid" class="banks-grid"></div>
  </div>

  <div class="modal-overlay" id="mainModal">
    <div class="modal-container">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="deposit-data.js"></script>
  <script>
    (function() {
      // الحصول على البيانات من الملف الخارجي
      function getExternalData() {
        if (typeof window.completeDepositBanksData !== 'undefined') {
          return JSON.parse(JSON.stringify(window.completeDepositBanksData));
        } else if (typeof completeDepositBanksData !== 'undefined') {
          return JSON.parse(JSON.stringify(completeDepositBanksData));
        }
        return null;
      }

      // إعدادات IndexedDB
      const DB_NAME = 'BanqOkDepositsDB';
      const DB_VERSION = 3;
      const STORE_NAME = 'banks';

      let depositsData = [];
      let currentBankId = null;
      let currentEditingDeposit = null;

      const banksGrid = document.getElementById('banksGrid');
      const modalOverlay = document.getElementById('mainModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalContent = document.getElementById('modalContent');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const statsContainer = document.getElementById('statsContainer');
      const exportBtn = document.getElementById('exportDataBtn');
      const importBtn = document.getElementById('importDataBtn');
      const refreshStatsBtn = document.getElementById('refreshStatsBtn');
      const resetDatabaseBtn = document.getElementById('resetDatabaseBtn');
      const progressBar = document.getElementById('progressBar');

      function updateProgress(percent) {
        progressBar.style.width = percent + '%';
        if (percent >= 100) setTimeout(() => progressBar.style.width = '0%', 500);
      }

      // تحميل البيانات من IndexedDB
      async function loadDataFromDB() {
        return new Promise((resolve) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onerror = () => {
            const extData = getExternalData();
            resolve(extData || []);
          };
          request.onsuccess = () => {
            const db = request.result;
            const tx = db.transaction([STORE_NAME], 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const getAll = store.getAll();
            getAll.onsuccess = () => {
              const data = getAll.result;
              if (data && data.length > 0) resolve(data);
              else resolve(getExternalData() || []);
            };
            getAll.onerror = () => resolve(getExternalData() || []);
          };
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
        });
      }

      async function saveDataToDB(data) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => {
            const db = request.result;
            const tx = db.transaction([STORE_NAME], 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.clear();
            data.forEach(bank => store.add(bank));
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          };
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
        });
      }

      async function resetFromExternalSource() {
        const freshData = getExternalData();
        if (!freshData || freshData.length === 0) {
          alert('لم يتم العثور على البيانات في الملف الخارجي deposit-data.js');
          return false;
        }
        depositsData = JSON.parse(JSON.stringify(freshData));
        await saveDataToDB(depositsData);
        renderBanksGrid();
        renderStats();
        return true;
      }

      function calculateStats() {
        let totalBanks = depositsData.length;
        let certs = 0, savings = 0, fixed = 0;
        depositsData.forEach(bank => {
          certs += bank.depositTypes?.certificates?.length || 0;
          savings += bank.depositTypes?.savingsAccounts?.length || 0;
          fixed += bank.depositTypes?.fixedDeposits?.length || 0;
        });
        return { totalBanks, certificatesCount: certs, savingsCount: savings, fixedCount: fixed };
      }

      function renderStats() {
        const s = calculateStats();
        statsContainer.innerHTML = `
          <div class="stat-card"><div class="stat-icon banks"><i class="bi bi-bank2"></i></div><div class="stat-details"><h3>${s.totalBanks}</h3><p>إجمالي البنوك</p></div></div>
          <div class="stat-card"><div class="stat-icon certificates"><i class="bi bi-trophy"></i></div><div class="stat-details"><h3>${s.certificatesCount}</h3><p>شهادات ادخار</p></div></div>
          <div class="stat-card"><div class="stat-icon savings"><i class="bi bi-wallet2"></i></div><div class="stat-details"><h3>${s.savingsCount}</h3><p>حسابات توفير</p></div></div>
          <div class="stat-card"><div class="stat-icon fixed"><i class="bi bi-calendar-check"></i></div><div class="stat-details"><h3>${s.fixedCount}</h3><p>ودائع ثابتة</p></div></div>
        `;
      }

      function getDisplayInterestRate(deposit) {
        if (deposit.interestRates && typeof deposit.interestRates === 'object') {
          const firstKey = Object.keys(deposit.interestRates)[0];
          if (firstKey) {
            const val = deposit.interestRates[firstKey];
            if (typeof val === 'object') return JSON.stringify(val);
            return val + '%';
          }
        }
        return deposit.interestRates || '0%';
      }

      function renderBanksGrid() {
        if (!depositsData.length) {
          banksGrid.innerHTML = '<div style="text-align:center;padding:50px;">جاري تحميل البيانات...</div>';
          return;
        }
        let html = '';
        depositsData.forEach(bank => {
          const certCount = bank.depositTypes?.certificates?.length || 0;
          const savCount = bank.depositTypes?.savingsAccounts?.length || 0;
          const fixCount = bank.depositTypes?.fixedDeposits?.length || 0;
          const total = certCount + savCount + fixCount;
          const logoUrl = bank.logo || 'https://via.placeholder.com/70?text=Bank';
          html += `
            <div class="bank-card">

      // فتح نافذة تعديل الوديعة مع جميع الحقول المتوافقة مع البيانات
      window.openEditDepositModal = function(bankId, category, index) {
        const bank = depositsData.find(b => b.id === bankId);
        if (!bank) return;
        const deposit = bank.depositTypes[category]?.[index];
        if (!deposit) return;
        currentEditingDeposit = { bankId, category, index };
        
        // تحويل interestRates إلى نص JSON لعرضه في حقل النص
        const interestRatesJson = JSON.stringify(deposit.interestRates || {}, null, 2);
        
        modalTitle.innerHTML = `<i class="bi bi-pencil-square"></i> تعديل الوديعة - ${deposit.name}`;
        modalContent.innerHTML = `
          <div class="edit-deposit-form">
            <div class="form-grid">
              <div class="form-group"><label>اسم المنتج <span style="color:red;">*</span></label><input type="text" id="editDepositName" value="${escapeHtml(deposit.name)}"></div>
              <div class="form-group"><label>الفئة</label><select id="editCategory"><option value="certificates" ${category === 'certificates' ? 'selected' : ''}>شهادات ادخار</option><option value="savingsAccounts" ${category === 'savingsAccounts' ? 'selected' : ''}>حسابات توفير</option><option value="fixedDeposits" ${category === 'fixedDeposits' ? 'selected' : ''}>ودائع ثابتة</option></select></div>

              <div class="form-group"><label>المدد (شهور - مفصولة بفواصل)</label><input type="text" id="editDurations" value="${(deposit.durations || []).join(',')}"><div class="info-text">مثال: 3,6,12</div></div>
              <div class="form-group"><label>نسبة العائد (JSON أو قيمة رقمية)</label><textarea id="editInterestRates" rows="3" class="json-editor">${interestRatesJson}</textarea><div class="info-text">مثال: 15.5 أو {"3months": 14.25, "6months": 14.0}</div></div>
              <div class="form-group"><label>أنواع صرف العائد</label><input type="text" id="editReturnType" value="${(deposit.returnType || []).join(',')}"><div class="info-text">مثال: monthly,quarterly,maturity</div></div>
              <div class="form-group"><label>السحب المبكر مسموح</label><select id="editEarlyWithdrawal"><option value="true" ${deposit.earlyWithdrawal === true ? 'selected' : ''}>نعم</option><option value="false" ${deposit.earlyWithdrawal === false ? 'selected' : ''}>لا</option></select></div>
              <div class="form-group"><label>رسوم السحب المبكر</label><input type="text" id="editEarlyWithdrawalFee" value="${deposit.earlyWithdrawalFee || ''}"></div>
              <div class="form-group"><label>نسبة الضريبة (%)</label><input type="number" step="0.1" id="editTaxRate" value="${deposit.taxRate || 0}"></div>
              <div class="form-group"><label>رسوم الحساب</label><input type="number" id="editAccountFees" value="${deposit.accountFees || 0}"></div>
              <div class="form-group"><label>الوصف</label><textarea id="editDescription" rows="2">${escapeHtml(deposit.description || '')}</textarea></div>
            </div>
            <hr>
            <h4 style="margin-bottom:15px;">حقول إضافية متقدمة</h4>
            <div class="form-grid">
              <div class="form-group"><label>المميزات (مفصولة بفواصل)</label><input type="text" id="editAdvantages" value="${(deposit.advantages || []).join(',')}"></div>
              <div class="form-group"><label>الشروط (مفصولة بفواصل)</label><input type="text" id="editTerms" value="${(deposit.terms || []).join(',')}"></div>
              <div class="form-group"><label>متطلبات خاصة</label><input type="text" id="editSpecialRequirements" value="${deposit.specialRequirements || ''}"></div>
            </div>
            <div style="display:flex;gap:15px;margin-top:30px;">
              <button class="btn btn-primary" onclick="window.saveDepositChanges()" style="flex:2;"><i class="bi bi-check-lg"></i> حفظ التغييرات</button>
              <button class="btn btn-secondary" onclick="window.closeModal()" style="flex:1;"><i class="bi bi-x-lg"></i> إلغاء</button>
              <button class="btn btn-danger" onclick="window.confirmDeleteDeposit()" style="flex:1;"><i class="bi bi-trash"></i> حذف</button>
            </div>
          </div>
        `;
        modalOverlay.classList.add('active');
      };

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
          return c;
        });
      }

      window.saveDepositChanges = async function() {
        if (!currentEditingDeposit) return;
        const { bankId, category, index } = currentEditingDeposit;
        const bank = depositsData.find(b => b.id === bankId);
        if (!bank || !bank.depositTypes[category] || !bank.depositTypes[category][index]) return;
        
        const deposit = bank.depositTypes[category][index];
        
        // حفظ البيانات الأساسية
        deposit.name = document.getElementById('editDepositName').value;
        deposit.minAmount = parseFloat(document.getElementById('editMinAmount').value) || 0;
        deposit.maxAmount = parseFloat(document.getElementById('editMaxAmount').value) || 0;
        
        const durationsStr = document.getElementById('editDurations').value;
        deposit.durations = durationsStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        
        // معالجة interestRates (يمكن أن تكون رقماً أو كائناً)
        const interestRatesStr = document.getElementById('editInterestRates').value;
        try {
          const parsed = JSON.parse(interestRatesStr);
          deposit.interestRates = parsed;
        } catch(e) {
          const numVal = parseFloat(interestRatesStr);
          if (!isNaN(numVal)) {
            deposit.interestRates = numVal;
          } else {
            deposit.interestRates = interestRatesStr;
          }
        }
        
        const returnStr = document.getElementById('editReturnType').value;
        deposit.returnType = returnStr.split(',').map(s => s.trim()).filter(s => s);
        
        deposit.earlyWithdrawal = document.getElementById('editEarlyWithdrawal').value === 'true';
        deposit.earlyWithdrawalFee = document.getElementById('editEarlyWithdrawalFee').value;
        deposit.taxRate = parseFloat(document.getElementById('editTaxRate').value) || 0;
        deposit.accountFees = parseFloat(document.getElementById('editAccountFees').value) || 0;
        deposit.description = document.getElementById('editDescription').value;
        
        // الحقول المتقدمة
        const advantagesStr = document.getElementById('editAdvantages').value;
        deposit.advantages = advantagesStr.split(',').map(s => s.trim()).filter(s => s);
        const termsStr = document.getElementById('editTerms').value;
        deposit.terms = termsStr.split(',').map(s => s.trim()).filter(s => s);
        deposit.specialRequirements = document.getElementById('editSpecialRequirements').value;
        
        // تغيير الفئة إذا لزم الأمر
        const newCategory = document.getElementById('editCategory').value;
        if (newCategory !== category) {
          bank.depositTypes[category].splice(index, 1);
          if (!bank.depositTypes[newCategory]) bank.depositTypes[newCategory] = [];
          bank.depositTypes[newCategory].push(deposit);
        }
        
        updateProgress(70);
        await saveDataToDB(depositsData);
        renderBanksGrid();
        renderStats();
        updateProgress(100);
        alert('تم تحديث الوديعة بنجاح');
        window.closeModal();
      };

      window.confirmDeleteDeposit = async function() {
        if (!currentEditingDeposit) return;
        if (!confirm('هل أنت متأكد من حذف هذه الوديعة؟ لا يمكن التراجع.')) return;
        const { bankId, category, index } = currentEditingDeposit;
        const bank = depositsData.find(b => b.id === bankId);
        if (bank && bank.depositTypes[category]) {
          bank.depositTypes[category].splice(index, 1);
          await saveDataToDB(depositsData);
          renderBanksGrid();
          renderStats();
          alert('تم حذف الوديعة');
          window.closeModal();
        }
      };

        `;

      window.saveNewDeposit = async function(bankId) {
        const bank = depositsData.find(b => b.id === bankId);
        if (!bank) return;
        const category = document.getElementById('newDepositCategory').value;
        const name = document.getElementById('newDepositName').value || 'منتج جديد';
        const minAmount = parseFloat(document.getElementById('newMinAmount').value) || 0;
        const maxAmount = parseFloat(document.getElementById('newMaxAmount').value) || 0;
        const durations = document.getElementById('newDurations').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        const interestRate = parseFloat(document.getElementById('newInterestRate').value) || 0;
        const returnTypes = document.getElementById('newReturnType').value.split(',').map(s => s.trim()).filter(s => s);
        const earlyFee = document.getElementById('newEarlyFee').value;
        const taxRate = parseFloat(document.getElementById('newTaxRate').value) || 0;
        
        const interestRates = {};
        if (durations.length) interestRates[durations[0]] = interestRate;
        else interestRates['1'] = interestRate;
        
        const newDeposit = {
          name, minAmount, maxAmount, durations, interestRates,
          returnType: returnTypes, earlyWithdrawal: true, earlyWithdrawalFee: earlyFee,
          taxRate, accountFees: 0
        };
        
        if (!bank.depositTypes[category]) bank.depositTypes[category] = [];
        bank.depositTypes[category].push(newDeposit);
        await saveDataToDB(depositsData);
        window.manageBankDeposits(bankId);
        renderBanksGrid();
        renderStats();
        alert('تمت إضافة الوديعة بنجاح');
      };

      window.saveAdvancedDeposit = async function(bankId) {

        const category = document.getElementById('advDepositCategory').value;
        const jsonStr = document.getElementById('advDepositJson').value;

          bank.depositTypes[category].push(newDeposit);
          await saveDataToDB(depositsData);
          window.manageBankDeposits(bankId);
          renderBanksGrid();
          renderStats();
          alert('تمت إضافة الوديعة بنجاح');

      // تعديل بيانات البنك الأساسية

              <div class="form-group"><label>مؤشر الأمان (%)</label><input type="number" step="1" id="editSafetyIndex" value="${bank.safetyIndex || 0}"></div>
              <div class="form-group"><label>رقم الاتصال</label><input type="text" id="editContactPhone" value="${bank.contactPhone || ''}"></div>
              <div class="form-group"><label>الخدمات الإلكترونية</label><select id="editOnlineAvailable"><option value="true" ${bank.onlineAvailable === true ? 'selected' : ''}>متاحة</option><option value="false" ${bank.onlineAvailable === false ? 'selected' : ''}>غير متاحة</option></select></div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
              <button class="btn btn-primary" onclick="window.saveBankEdit(${bankId})"><i class="bi bi-check-lg"></i> حفظ</button>
              <button class="btn btn-secondary" onclick="window.closeModal()">إلغاء</button>
            </div>
          </div>
        `;
        modalOverlay.classList.add('active');
      };

      window.saveBankEdit = async function(bankId) {
        const bank = depositsData.find(b => b.id === bankId);
        if (bank) {
          bank.name = document.getElementById('editBankName').value;
          bank.nameEn = document.getElementById('editBankNameEn').value;
          bank.type = document.getElementById('editBankType').value;
          bank.logo = document.getElementById('editBankLogo').value;
          bank.branches = parseInt(document.getElementById('editBranches').value) || 0;
          bank.safetyIndex = parseInt(document.getElementById('editSafetyIndex').value) || 0;
          bank.contactPhone = document.getElementById('editContactPhone').value;
          bank.onlineAvailable = document.getElementById('editOnlineAvailable').value === 'true';
          await saveDataToDB(depositsData);
          renderBanksGrid();
          renderStats();
          alert('تم تحديث بيانات البنك');
          window.closeModal();
        }
      };

      function exportData() {
        const dataStr = JSON.stringify(depositsData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `banqok_deposits_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('تم تصدير البيانات');
      }

      function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          const reader = new FileReader();
          reader.onload = async (ev) => {
            try {
              const imported = JSON.parse(ev.target.result);
              if (Array.isArray(imported)) {
                depositsData = imported;
                await saveDataToDB(depositsData);
                renderBanksGrid();
                renderStats();
                alert('تم الاستيراد بنجاح');
              } else throw new Error();
            } catch { alert('ملف غير صالح'); }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      window.closeModal = function() { 
        modalOverlay.classList.remove('active'); 
        modalContent.innerHTML = ''; 
        const container = document.getElementById('editFormContainer'); 
        if (container) container.innerHTML = ''; 
        currentEditingDeposit = null; 
      };

      async function init() {
        depositsData = await loadDataFromDB();
        if (!depositsData || depositsData.length === 0) {
          const ext = getExternalData();
          if (ext) depositsData = JSON.parse(JSON.stringify(ext));
          else depositsData = [];
        }
        renderBanksGrid();
        renderStats();
        closeModalBtn.addEventListener('click', window.closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) window.closeModal(); });
        exportBtn.addEventListener('click', exportData);
        importBtn.addEventListener('click', importData);
        refreshStatsBtn.addEventListener('click', () => { renderStats(); alert('تم تحديث الإحصائيات'); });
        resetDatabaseBtn.addEventListener('click', async () => {
          if (confirm('سيتم استبدال البيانات بالنسخة الأصلية من الملف الخارجي (deposit-data.js). هل أنت متأكد؟')) {
            await resetFromExternalSource();
          }
        });
      }
      init();
    })();
  </script>
</body>
</html>
